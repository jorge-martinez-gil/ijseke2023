name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install harness dependencies
        run: pip install numpy pandas scipy scikit-learn matplotlib

      - name: Syntax and import checks
        run: |
          python -m py_compile methods/*.py
          python -m py_compile bench/*.py
          python -m py_compile examples/*.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Benchmark smoke test (regenerates results/)
        run: python -m bench --quick --datasets mc geresid --methods lr lgp
        env:
          MPLCONFIGDIR: /tmp/mpl
