name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax and import checks
        run: |
          python -m py_compile methods/*.py
          python -m py_compile examples/*.py

      - name: Smoke test demos (MC)
        run: |
          python examples/demo_lr.py
          python examples/demo_tgp.py
